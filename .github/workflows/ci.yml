name: Predictive Maintenance CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Codebase
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest

    - name: Import & Blueprints Validation
      run: |
        python -c "from backend.app.app import app; print('✅ Success: Flask application factory and route blueprints imported cleanly!')"

    - name: Model Loading Validation
      run: |
        python -c "from backend.app.utils.model_loader import load_prediction_model; load_prediction_model(); print('✅ Success: Serialized optimal ML model loaded successfully!')"

    - name: Run PyTest Suite
      run: |
        pytest
